name: Deploy ArgoCD

on:
  # Uncomment push trigger when deploying to cloud (EKS)
  # push:
  #   branches: [main]
  workflow_dispatch:

# For cloud (EKS): GitHub Actions runner connects to EKS via AWS credentials
# For local: use deploy.sh instead (this workflow won't run without a runner)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Update kubeconfig for EKS
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME || 'local-cluster' }}

      - name: Verify cluster access
        run: kubectl cluster-info && kubectl get nodes

      - name: Create namespace
        run: kubectl apply -f base/namespace.yaml

      - name: Deploy ArgoCD core
        run: kubectl apply -n argocd -f base/install.yaml --server-side --force-conflicts

      - name: Apply customizations
        run: kubectl apply -f base/argocd-server-nodeport.yaml

      - name: Wait for ArgoCD rollout
        run: |
          echo "Waiting for ArgoCD deployments..."
          kubectl -n argocd rollout status deployment/argocd-server --timeout=180s
          kubectl -n argocd rollout status deployment/argocd-repo-server --timeout=180s
          kubectl -n argocd rollout status deployment/argocd-redis --timeout=180s
          kubectl -n argocd rollout status deployment/argocd-dex-server --timeout=180s
          kubectl -n argocd rollout status deployment/argocd-notifications-controller --timeout=180s
          kubectl -n argocd rollout status deployment/argocd-applicationset-controller --timeout=180s
          echo "All ArgoCD components are ready."

      - name: Deploy ArgoCD Applications
        run: kubectl apply -f apps/

      - name: Verify ArgoCD health
        run: |
          echo "=== ArgoCD Pods ==="
          kubectl -n argocd get pods
          echo ""
          echo "=== ArgoCD Applications ==="
          kubectl -n argocd get applications
